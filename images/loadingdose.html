  const k    = 0.55;       // elimination rate h⁻¹  (t½ ≈ 1.3 h)

  // Sum = Css  (flat at steady state from t=0)
  function withLoad(t) { return CSS; }

  // ── Generate point arrays ─────────────────────────────────────────────────
  const STEP = 0.03;
  const tArr = [];
  for (let t = 0; t <= T_MAX; t += STEP) tArr.push(t);

  // ── SVG helpers ───────────────────────────────────────────────────────────
  const NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, parent) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }
  function tx(elem, text) { elem.textContent = text; return elem; }

  function toX(t) { return PAD.left + (t / T_MAX) * CW; }
  function toY(c) { return PAD.top  + CH - (Math.min(c, C_MAX) / C_MAX) * CH; }

  function makePath(fn) {
    return tArr.map((t, i) => `${i===0?'M':'L'}${toX(t).toFixed(1)},${toY(fn(t)).toFixed(1)}`).join(' ');
  }

  function makeArea(fn) {
    const base = PAD.top + CH;
    const x0   = toX(tArr[0]);
    const xn   = toX(tArr[tArr.length - 1]);
    return makePath(fn) + ` L${xn},${base} L${x0},${base} Z`;
  }

  // Area below MIC for no-load curve (only where C < MIC)
  function makeSubMICArea() {
    // C(t) = Css*(1-e^{-kt}); below MIC until t* = -ln(1 - MIC/Css)/k
    const tStar = -Math.log(1 - MIC / CSS) / k;
    const pts = tArr.filter(t => t <= tStar + 0.01);
    if (pts.length < 2) return '';
    const micY = toY(MIC);
    const lines = pts.map((t, i) => {
      const y = toY(noLoad(t));
      return `${i===0?'M':'L'}${toX(t).toFixed(1)},${y.toFixed(1)}`;
    });
    const xn = toX(pts[pts.length-1]);
    return lines.join(' ') + ` L${xn},${micY} L${toX(pts[0])},${micY} Z`;
  }

  // ── Build SVG ─────────────────────────────────────────────────────────────
  const svg = document.getElementById('chart');
  svg.setAttribute('xmlns', NS);
  svg.setAttribute('width',  W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.style.overflow = 'visible';

  // defs
  const defs = el('defs', {}, svg);

  // gradient: no-load area
  const gNL = el('linearGradient', { id:'grad-nl', x1:'0', y1:'0', x2:'0', y2:'1' }, defs);
  el('stop', { offset:'0%',   'stop-color':'#dc2626', 'stop-opacity':'0.15' }, gNL);
  el('stop', { offset:'100%', 'stop-color':'#dc2626', 'stop-opacity':'0.02' }, gNL);

  // gradient: with-load area
  const gWL = el('linearGradient', { id:'grad-wl', x1:'0', y1:'0', x2:'0', y2:'1' }, defs);
  el('stop', { offset:'0%',   'stop-color':'#2563eb', 'stop-opacity':'0.12' }, gWL);
  el('stop', { offset:'100%', 'stop-color':'#2563eb', 'stop-opacity':'0.02' }, gWL);

  // sub-MIC danger fill
  const gSM = el('linearGradient', { id:'grad-submic', x1:'0', y1:'0', x2:'0', y2:'1' }, defs);
  el('stop', { offset:'0%',   'stop-color':'#dc2626', 'stop-opacity':'0.08' }, gSM);
  el('stop', { offset:'100%', 'stop-color':'#dc2626', 'stop-opacity':'0.22' }, gSM);

  // Background rect
  el('rect', { x:PAD.left, y:PAD.top, width:CW, height:CH, fill:'#ffffff', rx:'3',
               stroke:'#e2e8f0', 'stroke-width':'1' }, svg);

  // ── Grid ──────────────────────────────────────────────────────────────────
  const yTicks = [0, 1, 2, 3, 4, 5, 6];
  const xTicks = [0, 2, 4, 6, 8, 10, 12];

  yTicks.forEach(v => {
    const y = toY(v);
    el('line', { x1:PAD.left, x2:PAD.left+CW, y1:y, y2:y,
                 stroke: v===0 ? '#cbd5e1' : '#e2e8f0', 'stroke-width': v===0 ? 1.5 : 1 }, svg);
  });
  xTicks.forEach(v => {
    const x = toX(v);
    el('line', { x1:x, x2:x, y1:PAD.top, y2:PAD.top+CH,
                 stroke:'#e2e8f0', 'stroke-width':'1' }, svg);
  });

  // ── Target therapeutic range band (1–5× MIC, i.e. MIC to ~Css+a bit) ──
  const bandTop = toY(5);
  const bandBot = toY(MIC);
  el('rect', { x:PAD.left, y:bandTop, width:CW, height:bandBot-bandTop,
               fill:'rgba(37,99,235,0.05)' }, svg);

  // ── Sub-MIC danger zone (no-load only) ───────────────────────────────────
  const subMICPath = makeSubMICArea();
  if (subMICPath) {
    el('path', { d:subMICPath, fill:'url(#grad-submic)' }, svg);
  }

  // ── Area fills ────────────────────────────────────────────────────────────
  el('path', { d:makeArea(noLoad),   fill:'url(#grad-nl)' }, svg);
  el('path', { d:makeArea(withLoad), fill:'url(#grad-wl)' }, svg);

  // ── MIC line ──────────────────────────────────────────────────────────────
  const micY = toY(MIC);
  el('line', { x1:PAD.left, x2:PAD.left+CW, y1:micY, y2:micY,
               stroke:'#f59e0b', 'stroke-width':'1.8', 'stroke-dasharray':'7 4', opacity:'1' }, svg);
  tx(el('text', { x:PAD.left+8, y:micY-6,
    fill:'#b45309', 'font-size':'11', 'font-family':'Arial,sans-serif', 'font-weight':'600' }, svg), 'MIC');

  // ── Css target line ───────────────────────────────────────────────────────
  const cssY = toY(CSS);
  el('line', { x1:PAD.left, x2:PAD.left+CW, y1:cssY, y2:cssY,
               stroke:'#2563eb', 'stroke-width':'1.2', 'stroke-dasharray':'4 4', opacity:'.5' }, svg);
  tx(el('text', { x:PAD.left+8, y:cssY-6,
    fill:'#2563eb', 'font-size':'10', 'font-family':'Arial,sans-serif', 'font-weight':'600', opacity:'.7' }, svg), 'C target (4×MIC)');

  // ── t* annotation: time no-load crosses MIC ───────────────────────────────
  const tStar  = -Math.log(1 - MIC / CSS) / k;
  const tStarX = toX(tStar);
  el('line', { x1:tStarX, x2:tStarX, y1:micY, y2:PAD.top+CH,
               stroke:'#dc2626', 'stroke-width':'1.2', 'stroke-dasharray':'3 3', opacity:'.7' }, svg);

  // Sub-MIC bracket
  const bracketY = PAD.top + CH + 36;
  el('line', { x1:toX(0), x2:tStarX, y1:bracketY, y2:bracketY,
               stroke:'#dc2626', 'stroke-width':'1.5' }, svg);
  el('line', { x1:toX(0),  x2:toX(0),  y1:bracketY-5, y2:bracketY+5, stroke:'#dc2626', 'stroke-width':'1.5' }, svg);
  el('line', { x1:tStarX,  x2:tStarX,  y1:bracketY-5, y2:bracketY+5, stroke:'#dc2626', 'stroke-width':'1.5' }, svg);
  tx(el('text', {
    x: (toX(0)+tStarX)/2, y: bracketY-8,
    'text-anchor':'middle', fill:'#dc2626', 'font-size':'10',
    'font-family':'Arial,sans-serif', 'font-weight':'600'
  }, svg), `T < MIC ≈ ${tStar.toFixed(1)} h`);

  // ── Curves ────────────────────────────────────────────────────────────────
  el('path', { d:makePath(noLoad),   fill:'none', stroke:'#dc2626', 'stroke-width':'2.4', 'stroke-linejoin':'round' }, svg);
  el('path', { d:makePath(withLoad), fill:'none', stroke:'#2563eb', 'stroke-width':'2.4', 'stroke-linejoin':'round' }, svg);

  // Loading dose arrow annotation
  const arrowX = toX(0) + 2;
  const arrowY1 = toY(0);
  const arrowY2 = toY(CSS) + 2;
  el('line', { x1:arrowX+18, x2:arrowX+18, y1:arrowY1, y2:arrowY2+8,
               stroke:'#2563eb', 'stroke-width':'1.5', 'marker-end':'url(#arr)' }, svg);
  const markerDef = el('marker', { id:'arr', markerWidth:'8', markerHeight:'8', refX:'4', refY:'4', orient:'auto' }, defs);
  el('path', { d:'M1,1 L7,4 L1,7 Z', fill:'#2563eb' }, markerDef);
  tx(el('text', { x:arrowX+24, y:(arrowY1+arrowY2)/2+4,
    fill:'#2563eb', 'font-size':'10', 'font-family':'Arial,sans-serif', 'font-weight':'600' }, svg), 'Loading');
  tx(el('text', { x:arrowX+24, y:(arrowY1+arrowY2)/2+16,
    fill:'#2563eb', 'font-size':'10', 'font-family':'Arial,sans-serif', 'font-weight':'600' }, svg), 'dose');

  // ── Axes ──────────────────────────────────────────────────────────────────
  el('line', { x1:PAD.left, x2:PAD.left+CW, y1:PAD.top+CH, y2:PAD.top+CH, stroke:'#94a3b8', 'stroke-width':'1.5' }, svg);
  el('line', { x1:PAD.left, x2:PAD.left,    y1:PAD.top,    y2:PAD.top+CH, stroke:'#94a3b8', 'stroke-width':'1.5' }, svg);

  xTicks.forEach(v => {
    const x = toX(v);
    el('line', { x1:x, x2:x, y1:PAD.top+CH, y2:PAD.top+CH+4, stroke:'#94a3b8', 'stroke-width':'1' }, svg);
    tx(el('text', { x, y:PAD.top+CH+17, 'text-anchor':'middle',
      fill:'#64748b', 'font-size':'11', 'font-family':'Arial,sans-serif' }, svg), v);
  });
  tx(el('text', { x:PAD.left+CW/2, y:H-5, 'text-anchor':'middle',
    fill:'#64748b', 'font-size':'12', 'font-family':'Arial,sans-serif', 'letter-spacing':'0.07em' }, svg),
    'Time (hours)');

  yTicks.forEach(v => {
    const y = toY(v);
    el('line', { x1:PAD.left-4, x2:PAD.left, y1:y, y2:y, stroke:'#94a3b8', 'stroke-width':'1' }, svg);
    tx(el('text', { x:PAD.left-10, y:y+4, 'text-anchor':'end',
      fill:'#64748b', 'font-size':'11', 'font-family':'Arial,sans-serif' }, svg), v);
  });
  const cy2 = PAD.top + CH/2;
  tx(el('text', { x:15, y:cy2, 'text-anchor':'middle', fill:'#64748b', 'font-size':'12',
    'font-family':'Arial,sans-serif', 'letter-spacing':'0.07em',
    transform:`rotate(-90,15,${cy2})` }, svg), 'Concentration (× MIC)');

  // ── Legend ────────────────────────────────────────────────────────────────
  const LEGEND = [
    { label:'With loading dose', sub:'Immediate target attainment', badge:'T > MIC: 100%', color:'#2563eb' },
    { label:'No loading dose',   sub:'Gradual rise to steady state', badge:`T < MIC: ~${tStar.toFixed(1)} h`, color:'#dc2626' },
  ];
  LEGEND.forEach((c, i) => {
    const lx = PAD.left + CW + 20;
    const ly = PAD.top + 20 + i * 80;
    el('rect', { x:lx, y:ly, width:140, height:68, rx:'6',
      fill:'#ffffff', stroke:c.color, 'stroke-width':'1.2' }, svg);
    el('line', { x1:lx+10, x2:lx+34, y1:ly+16, y2:ly+16, stroke:c.color, 'stroke-width':'2.5' }, svg);
    el('circle', { cx:lx+22, cy:ly+16, r:'3.5', fill:c.color }, svg);
    tx(el('text', { x:lx+42, y:ly+20, fill:c.color,
      'font-size':'11', 'font-family':'Arial,sans-serif', 'font-weight':'700' }, svg), c.label);
    tx(el('text', { x:lx+10, y:ly+36, fill:'#475569',
      'font-size':'9.5', 'font-family':'Arial,sans-serif' }, svg), c.sub);
    tx(el('text', { x:lx+10, y:ly+54,
      fill: i===0 ? '#2563eb' : '#dc2626',
      'font-size':'10', 'font-family':'Arial,sans-serif', 'font-weight':'600' }, svg), c.badge);
  });

  // MIC legend entry
  const lx3 = PAD.left + CW + 20;
  const ly3  = PAD.top + 20 + 2 * 80;
  el('rect', { x:lx3, y:ly3, width:140, height:42, rx:'6',
    fill:'#fffbeb', stroke:'#f59e0b', 'stroke-width':'1.2' }, svg);
  el('line', { x1:lx3+10, x2:lx3+34, y1:ly3+14, y2:ly3+14,
    stroke:'#f59e0b', 'stroke-width':'2', 'stroke-dasharray':'6 3' }, svg);
  tx(el('text', { x:lx3+42, y:ly3+18, fill:'#b45309',
    'font-size':'11', 'font-family':'Arial,sans-serif', 'font-weight':'700' }, svg), 'MIC');
  tx(el('text', { x:lx3+10, y:ly3+34, fill:'#92400e',
    'font-size':'9.5', 'font-family':'Arial,sans-serif' }, svg), 'Minimum inhibitory conc.');

})();
</script>
