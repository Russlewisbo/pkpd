<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Sans 3', sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Source+Serif+4:ital@1&display=swap');

  .figure {
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 32px 48px 24px;
    max-width: 760px;
    width: 100%;
  }

  svg { width: 100%; height: auto; display: block; }

  .caption {
    text-align: center;
    font-size: 12.5px;
    color: #666;
    margin-top: 14px;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="figure">
  <svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
      </marker>
      <marker id="arr-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#b45309"/>
      </marker>
      <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
      </marker>
      <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
      </marker>
    </defs>

    <!-- Protease Inhibitor -->
    <rect x="20" y="75" width="145" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="92" y="97" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#1e40af">Protease</text>
    <text x="92" y="113" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#1e40af">Inhibitor</text>

    <!-- Gut CYP3A4 -->
    <rect x="265" y="75" width="130" height="50" rx="6" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
    <text x="330" y="97" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#713f12">Gut</text>
    <text x="330" y="113" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#713f12">CYP3A4</text>

    <!-- ↓ Absorption -->
    <rect x="490" y="42" width="130" height="42" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="555" y="59" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#991b1b">↓ First-pass</text>
    <text x="555" y="75" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#991b1b">Metabolism</text>

    <!-- ↑ Bioavailability -->
    <rect x="490" y="116" width="130" height="42" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
    <text x="555" y="133" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#166534">↑ Bio-</text>
    <text x="555" y="149" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#166534">availability</text>

    <!-- Ritonavir -->
    <rect x="265" y="155" width="130" height="42" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5"/>
    <text x="330" y="172" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="12" font-weight="600" fill="#9d174d">Ritonavir</text>
    <text x="330" y="188" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="11" fill="#9d174d">(booster)</text>

    <!-- Arrow: PI → CYP3A4 -->
    <line x1="166" y1="100" x2="261" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Arrow: CYP3A4 → ↓ Absorption -->
    <line x1="395" y1="88" x2="486" y2="68" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>

    <!-- Arrow: PI → ↑ Bioavailability (curved below) -->
    <path d="M 92 125 Q 92 158 487 137" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

    <!-- Dashed arrow: Ritonavir --| CYP3A4 (inhibits) -->
    <line x1="330" y1="155" x2="330" y2="129" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

    <!-- Label: Inhibits -->
    <text x="338" y="147" font-family="Source Sans 3,sans-serif" font-size="10" fill="#b45309" font-style="italic">Inhibits</text>
  </svg>
