<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    margin: 0;
    padding: 0;
    font-family: 'Source Sans 3', sans-serif;
  }

  .figure {
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 20px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .caption {
    text-align: center;
    font-size: 12.5px;
    color: #666;
    margin-top: 14px;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="figure">
  <svg viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
      </marker>
      <marker id="arrow-return" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
      </marker>
    </defs>

    <!-- Nodes -->
    <!-- Liver -->
    <rect x="20" y="55" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="75" y="77" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Liver</text>

    <!-- GI Tract -->
    <rect x="185" y="55" width="110" height="50" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
    <text x="240" y="77" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#166534">GI Tract</text>

    <!-- Gut bacteria (highlighted) -->
    <rect x="350" y="55" width="110" height="50" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="405" y="74" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Gut</text>
    <text x="405" y="91" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Bacteria</text>

    <!-- Free drug -->
    <rect x="515" y="55" width="110" height="50" rx="6" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
    <text x="570" y="74" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#713f12">Free</text>
    <text x="570" y="91" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#713f12">Drug</text>

    <!-- Forward arrows (top) -->
    <line x1="132" y1="80" x2="181" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="297" y1="80" x2="346" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="462" y1="80" x2="511" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Return arrow (curved, bottom) -->
    <path d="M 570 107 Q 570 140 295 140 Q 20 140 20 107" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-return)"/>

    <!-- Arrow labels (top) -->
    <text x="156" y="40" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="600" fill="#555">Bile</text>
    <text x="322" y="35" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="600" fill="#555">Conjugated</text>
    <text x="322" y="48" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="600" fill="#555">drug</text>
    <text x="486" y="40" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="600" fill="#555">Deconjugation</text>

    <!-- Return label -->
    <text x="295" y="155" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="10" fill="#888">Reabsorption</text>
  </svg>
</div>
</body>
</html>
